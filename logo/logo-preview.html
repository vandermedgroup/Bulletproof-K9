<!DOCTYPE html><html><head><meta charset="utf-8">
<link href="https://fonts.googleapis.com/css2?family=Archivo:wght@600;700;800&display=swap" rel="stylesheet">
<style>
body{margin:0;background:#26282d;color:#eceae4;font-family:'Archivo',sans-serif;display:flex;flex-wrap:wrap;gap:60px;padding:60px;align-items:flex-start}
.card{background:#2c2f35;border:1px solid rgba(255,255,255,.1);border-radius:14px;padding:40px;display:flex;flex-direction:column;align-items:center;gap:24px}
.label{font-size:12px;letter-spacing:.2em;text-transform:uppercase;color:#9daeb6}
.lockup{display:flex;align-items:center;gap:16px}
.word{font-weight:800;font-size:30px;letter-spacing:.02em;line-height:1}
.word .k9{color:#9daeb6}
.sub{font-size:9px;letter-spacing:.42em;color:#86888e;text-transform:uppercase;margin-top:5px}
.light{background:#eceae4}.light .word{color:#26282d}.light .sub{color:#6a6c72}
.fav{width:48px;height:48px}
</style></head><body>

<div class="card">
  <span class="label">Emblema</span>
  <svg width="130" height="140" viewBox="0 0 120 130">
    <path d="M60 6 L108 24 L108 60 C108 92 86 112 60 123 C34 112 12 92 12 60 L12 24 Z" fill="none" stroke="#9daeb6" stroke-width="4"/>
    <g fill="#9daeb6">
      <path d="M43 60 L37 25 L60 50 Z"/>
      <path d="M77 60 L83 25 L60 50 Z"/>
      <path d="M42 50 Q60 44 78 50 L73 82 Q60 100 47 82 Z"/>
    </g>
    <circle cx="52" cy="63" r="3.2" fill="#2c2f35"/>
    <circle cx="68" cy="63" r="3.2" fill="#2c2f35"/>
    <path d="M55 80 L65 80 L60 89 Z" fill="#2c2f35"/>
  </svg>
</div>

<div class="card">
  <span class="label">Lockup horizontal</span>
  <div class="lockup">
    <svg width="66" height="72" viewBox="0 0 120 130">
      <path d="M60 6 L108 24 L108 60 C108 92 86 112 60 123 C34 112 12 92 12 60 L12 24 Z" fill="none" stroke="#9daeb6" stroke-width="5"/>
      <g fill="#9daeb6">
        <path d="M43 60 L37 25 L60 50 Z"/>
        <path d="M77 60 L83 25 L60 50 Z"/>
        <path d="M42 50 Q60 44 78 50 L73 82 Q60 100 47 82 Z"/>
      </g>
      <circle cx="52" cy="63" r="3.2" fill="#2c2f35"/>
      <circle cx="68" cy="63" r="3.2" fill="#2c2f35"/>
      <path d="M55 80 L65 80 L60 89 Z" fill="#2c2f35"/>
    </svg>
    <div>
      <div class="word">BULLETPROOF <span class="k9">K9</span></div>
      <div class="sub">Belgian Malinois · San Diego</div>
    </div>
  </div>
</div>

<div class="card light">
  <span class="label" style="color:#6a6c72">Sobre claro</span>
  <div class="lockup">
    <svg width="66" height="72" viewBox="0 0 120 130">
      <path d="M60 6 L108 24 L108 60 C108 92 86 112 60 123 C34 112 12 92 12 60 L12 24 Z" fill="none" stroke="#4b545f" stroke-width="5"/>
      <g fill="#3a4048">
        <path d="M43 60 L37 25 L60 50 Z"/>
        <path d="M77 60 L83 25 L60 50 Z"/>
        <path d="M42 50 Q60 44 78 50 L73 82 Q60 100 47 82 Z"/>
      </g>
      <circle cx="52" cy="63" r="3.2" fill="#eceae4"/>
      <circle cx="68" cy="63" r="3.2" fill="#eceae4"/>
      <path d="M55 80 L65 80 L60 89 Z" fill="#eceae4"/>
    </svg>
    <div><div class="word">BULLETPROOF <span class="k9" style="color:#4b545f">K9</span></div></div>
  </div>
</div>

<div class="card">
  <span class="label">Favicon</span>
  <svg class="fav" viewBox="0 0 120 130">
    <path d="M60 6 L108 24 L108 60 C108 92 86 112 60 123 C34 112 12 92 12 60 L12 24 Z" fill="#9daeb6"/>
    <g fill="#26282d">
      <path d="M43 60 L37 25 L60 50 Z"/>
      <path d="M77 60 L83 25 L60 50 Z"/>
      <path d="M42 50 Q60 44 78 50 L73 82 Q60 100 47 82 Z"/>
    </g>
  </svg>
</div>

</body></html>
